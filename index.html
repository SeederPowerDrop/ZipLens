<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/src/styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <title>Unzipper</title>
  <script type="module" src="/src/main.ts" defer></script>
</head>

<body>
  <div id="app">
    <!-- Titlebar configured to drag window in Tauri -->
    <div data-tauri-drag-region class="titlebar">
      <div class="titlebar-title">unzipper</div>
    </div>

    <main class="main-content">
      <!-- Main Drop Zone -->
      <div class="drop-zone animated" id="drop-zone">
        <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
          </path>
        </svg>
        <div class="drop-text">Drop archive to extract</div>
        <div class="drop-subtext">or click to browse files</div>
      </div>

      <!-- Extract / Compress Actions -->
      <div class="actions animated" style="animation-delay: 0.1s;">
        <div class="action-group flex-col">
          <button id="btn-extract" class="primary w-full">Extract Archive</button>
        </div>

        <div class="action-group border-left flex-col gap-sm">
          <div class="select-group">
            <div class="select-wrapper">
              <select id="format-select" class="custom-select">
                <option value="zip">.zip</option>
                <option value="tar.gz">.tar.gz</option>
                <option value="tar.zst">.tar.zst</option>
                <option value="7z">.7z</option>
              </select>
              <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </div>
            <div class="select-wrapper">
              <input type="text" id="split-select" class="custom-input" list="split-options" placeholder="Split Archive (e.g. 10m, 2g)">
              <datalist id="split-options">
                <option value="0">No Split</option>
                <option value="10m">10MB</option>
                <option value="100m">100MB</option>
                <option value="700m">700MB (CD)</option>
                <option value="4g">4GB (FAT32)</option>
              </datalist>
            </div>
          </div>

          <div class="toggle-password-container">
            <label class="toggle-checkbox-label">
              <input type="checkbox" id="enable-password-cb" class="toggle-checkbox">
              <span class="toggle-text">Set Password (Optional)</span>
            </label>
          </div>

          <div class="password-group" id="compress-password-group" style="display: none; height: 0; opacity: 0; overflow: hidden; transition: all 0.3s ease;">
            <div class="password-input-wrapper" style="position: relative; flex: 2;">
              <input type="password" id="compress-password" class="custom-input w-full" placeholder="Set password...">
              <button tabindex="-1" type="button" class="pwd-toggle-btn" id="compress-pwd-toggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <div class="select-wrapper small-select-wrapper">
              <select id="encrypt-level" class="custom-select small-select">
                <option value="AES-256">AES-256 (Recommended)</option>
                <option value="ZipCrypto">ZipC</option>
              </select>
              <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </div>
          </div>

          <div class="btn-group">
            <button id="btn-compress-file">Compress File</button>
            <button id="btn-compress">Compress Folder</button>
          </div>
        </div>
      </div>

      <!-- Progress Container (Hidden by default) -->
      <div class="progress-container" id="progress-container">
        <div class="progress-header">
          <span id="progress-status">Extracting...</span>
          <span id="progress-text">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-stats">
          <span id="progress-filename" class="progress-filename"></span>
          <div style="display: flex; align-items: center; gap: 12px;">
            <button id="btn-reveal" class="secondary" style="display: none; padding: 4px 12px; font-size: 11px; height: 26px; border-radius: 6px; background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2);">Reveal in Finder</button>
            <div class="time-stats">
              <span id="progress-elapsed">00:00</span>
              <span class="divider">|</span>
              <span id="progress-eta">ETA: --:--</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Preview Header (Hidden by default) -->
      <div id="preview-header" class="preview-header" style="display: none; flex-direction: column; gap: 8px;">
        <div style="display: flex; gap: 8px; align-items: center; width: 100%;">
          <span id="preview-stats" style="flex: 1; display: flex; flex-direction: column; gap: 2px;">
            <div id="preview-stats-main" style="font-weight: 600;">0 / 0 files selected</div>
            <div id="preview-stats-sub" style="font-size: 11px; color: var(--text-muted);"></div>
          </span>
          <div style="display: flex; align-items: center; gap: 6px;">
            <input type="text" id="preview-search" class="custom-input search-input" placeholder="Search (Enter to scroll)..." style="height: 28px; width: 170px; font-size: 11px; padding: 4px 8px;">
            <div id="search-matches-text" style="font-size: 11px; color: #f59e0b; font-weight: 600; width: 44px; text-align: center;"></div>
          </div>
          <button id="toggle-all" class="secondary-btn toggle-btn" style="height: 28px; padding: 0 12px; min-width: unset; font-size: 11px;">Invert Selection</button>
        </div>
        <div id="ext-filter-container" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;">
          <!-- Checkbox UI will be injected here -->
        </div>
      </div>

      <!-- Preview Columns Header (Hidden by default) -->
      <div id="preview-cols-header" class="preview-list-header" style="display: none;">
        <div class="sort-buttons">
          <button class="sort-btn active" data-sort="name">Name <span class="sort-arrow">▲</span></button>
          <button class="sort-btn" data-sort="size">Extracted Size <span class="sort-arrow"></span></button>
          <button class="sort-btn" data-sort="compressed">Compressed Size <span class="sort-arrow"></span></button>
          <button class="sort-btn" data-sort="ext">Extension <span class="sort-arrow"></span></button>
        </div>
      </div>

      <!-- Log Container (Hidden by default) -->
      <div class="log-container" id="log-container"></div>
    </main>
  </div>

  <!-- Password Prompt Modal Overlay (Hidden by default) -->
  <div id="password-modal" class="modal-overlay" style="display: none;">
    <div class="modal modern-modal">
      <div class="modal-icon modern-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h3>Password Required</h3>
      <p>This file is encrypted.<br>Please enter the password to open it.</p>
      
      <div id="modal-error-msg" class="modal-error-msg" style="display: none; color: #ef4444; font-size: 13px; margin-bottom: 12px; animation: shake 0.4s ease;">
        Incorrect password. Please try again.
      </div>
      
      <div class="password-input-wrapper w-full" style="position: relative; margin-bottom: 24px;">
        <input type="password" id="unlock-password" class="custom-input large-input w-full" placeholder="Enter password..." autocomplete="off">
        <button tabindex="-1" type="button" class="pwd-toggle-btn" id="unlock-pwd-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
      
      <div class="modal-actions">
        <button id="password-cancel" class="modern-btn secondary">Cancel</button>
        <button id="password-submit" class="modern-btn primary">Unlock</button>
      </div>
    </div>
  </div>

</body>
</html>
